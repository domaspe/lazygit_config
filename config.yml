git:
  pagers:
    - colorArg: always
      # pager: delta --paging=never --side-by-side --light --syntax-theme OneHalfLight
      pager: delta --paging=never --side-by-side --syntax-theme OneHalfDark
    - colorArg: always
      # pager: delta --paging=never --side-by-side --light --syntax-theme OneHalfLight
      pager: delta --paging=never --side-by-side  --light --syntax-theme OneHalfLight
    # - colorArg: always
    #   pager: delta --paging=never --syntax-theme OneHalfLight
    # - externalDiffCommand: difft --color=always
    # - externalDiffCommand: difft --color=always --display inline
os:
  edit: "nvim --server $NVIM --remote-send '<C-\\><C-n>:silent! close<CR>' && nvim --server $NVIM --remote {{filename}}"
  editAtLine: "nvim --server $NVIM --remote-send '<C-\\><C-n>:silent! close<CR>' && nvim --server $NVIM --remote +{{line}} {{filename}}"
  editInTerminal: false
  openDirInEditor: false
customCommands:
  - key: "<c-a>"
    description: "Generate AI commit message"
    # command: "command: "aicommit2 -c -s -d && pbpaste > .git/LAZYGIT_PENDING_COMMIT"
    command: "git diff --cached | opencode run --model opencode/big-pickle 'Generate a concise git commit message for these staged changes. Use only the staged diff provided via stdin. Do not use tools, inspect files, or ask follow-up questions. Output ONLY the commit message text, nothing else. Use conventional commit format (feat/fix/refactor/etc). Do not wrap in quotes or backticks.' | grep . | tee .git/LAZYGIT_PENDING_COMMIT"
    context: "files"
  - key: "<c-n>"
    description: "Suggest new branch name"
    command: "git diff --cached | opencode run --model opencode/big-pickle 'Based only on the staged diff provided via stdin, suggest a single concise git branch name in kebab-case with a conventional prefix (e.g. feature/, fix/, refactor/, chore/, docs/). Do not use tools, inspect files, or ask follow-up questions. Output ONLY the branch name, nothing else.' | grep . | tee /dev/stderr | pbcopy"
    context: "localBranches"
